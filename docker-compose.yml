services:
  postgres:
    image: postgres:16-alpine
    container_name: oman-sale-postgres
    environment:
      POSTGRES_USER: oman_sale
      POSTGRES_PASSWORD: oman_sale
      POSTGRES_DB: oman_sale
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oman_sale -d oman_sale"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oman-sale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["npm", "--workspace", "@oman-sale/api", "run", "start:worker"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
